# Nome da Aplicação
spring.application.name=pricewatch-api

# Porta Dinâmica para o Render
server.port=${PORT:8080}

# ==========================================
# CONFIGURAÇÃO DO POSTGRESQL (JPA / Hibernate)
# ==========================================
# Se a variável DB_URL não existir no Render, ele tentará usar o banco local do Docker
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/db_pricewatch}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:password123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Propriedades do Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# CONFIGURAÇÃO DO MONGODB (NoSQL)
# ==========================================
spring.mongodb.uri=${MONGO_URI:mongodb://admin:password123@localhost:27017/db_pricewatch?authSource=admin}

# ==========================================
# CONFIGURAÇÃO DO RABBITMQ (Mensageria)
# ==========================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:password123}

# Caso o CloudAMQP exija conexão segura (SSL/TLS), adicione esta linha:
spring.rabbitmq.ssl.enabled=${RABBITMQ_SSL:false}

# ==========================================
# CONFIGURAÇÃO DE ENVIO DE E-MAIL (Gmail Real)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USER:tiagofs5818@gmail.com}
spring.mail.password=${EMAIL_PASS:lfbpdxzraseahytw}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true